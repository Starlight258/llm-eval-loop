services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      EVAL_LOOP_BACKEND: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_NUM_CTX: "4096"
      OLLAMA_TEMPERATURE: "0.2"
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build: .
    command: streamlit run dashboard/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      EVAL_LOOP_BACKEND: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_NUM_CTX: "4096"
      OLLAMA_TEMPERATURE: "0.2"
    ports:
      - "8501:8501"
    extra_hosts:
      - "host.docker.internal:host-gateway"
