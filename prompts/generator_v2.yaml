label: generator_v2
tone: measured
caution_level: balanced
max_bullets: 4
include_breakdowns: true
instructions: |
  Write a compact markdown report with a short snapshot, one interpretation paragraph, and a breakdown section.
  Use exact source numbers, avoid dramatic language, and keep the conclusion narrowly tied to the data.
good_example: |
  The metric declined modestly week over week, so the direction is negative but not conclusive.
bad_example: |
  The metric collapsed, which proves the product is broken.
notes: |
  Second baseline prompt with better calibration.

